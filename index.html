<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>森林傳承動畫</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0f172a; overflow: hidden; color: white; font-family: sans-serif; }
        #canvas { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #tree-house { 
            position: absolute; width: 100vw; height: 100vh; top: 0; left: 0; 
            object-fit: cover; object-position: center; opacity: 0; transition: opacity 2s; z-index: 1; 
            filter: brightness(0.6);
        }
        
        .animal { position: absolute; font-size: 80px; transition: all 1.8s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; z-index: 10; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        #caption-box { position: absolute; bottom: 8%; width: 100%; text-align: center; z-index: 100; }
        .caption { display: inline-block; background: rgba(15, 23, 42, 0.9); padding: 15px 30px; border-radius: 8px; font-size: 24px; border-left: 5px solid #38bdf8; opacity: 0; transition: 0.5s; }
        .caption.active { opacity: 1; }

        .btn { position: absolute; z-index: 200; padding: 10px 20px; cursor: pointer; background: #38bdf8; color: black; border: none; border-radius: 5px; font-weight: bold; }
        #skip-btn { bottom: 20px; right: 20px; }
        #replay-btn { top: 20px; right: 20px; display: none; }
        #cta-btn { display: none; position: absolute; z-index: 300; background: #10b981; color: white; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 18px 36px; font-size: 26px; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body>

<div id="canvas">
    <button id="skip-btn" class="btn">跳過下一段 ➔</button>
    <button id="replay-btn" class="btn" onclick="location.reload()">重新播放</button>
    <button id="cta-btn" onclick="window.open('https://www.tahr.org.tw/civicrm/contribute/transact?reset=1&id=59', '_blank')">立即定期定額支持 ➔</button>
    
    <img id="tree-house" src="treehouse.png" alt="背景">
    
    <div id="bear" class="animal">🐻</div>
    <div id="fox" class="animal">🦊</div>
    <div id="rabbit" class="animal">🐰</div>

    <div id="caption-box"><div id="text" class="caption">動畫準備中...</div></div>
</div>

<script>
    const el = {
        bear: document.getElementById('bear'), fox: document.getElementById('fox'),
        rabbit: document.getElementById('rabbit'), house: document.getElementById('tree-house'),
        text: document.getElementById('text'), skip: document.getElementById('skip-btn'),
        cta: document.getElementById('cta-btn'), replay: document.getElementById('replay-btn')
    };

    let skipResolve = null;
    const wait = (ms) => new Promise(res => { skipResolve = res; setTimeout(res, ms); });

    function updateMsg(msg) {
        el.text.classList.remove('active');
        setTimeout(() => { el.text.innerText = msg; el.text.classList.add('active'); }, 300);
    }

    el.skip.onclick = () => { if(skipResolve) skipResolve(); };

    async function play() {
        // 1. 熊開場 (中間)
        updateMsg("42年的堅持，邀請你一起同行。");
        el.bear.style.opacity = "1";
        el.bear.style.top = "40%"; el.bear.style.left = "45%";
        await wait(4000);

        // 2. 世代集合
        updateMsg("現在，新的挑戰，需要更有活力的思維。");
        el.fox.style.opacity = "1";
        el.fox.style.top = "45%"; el.fox.style.left = "50%";
        el.rabbit.style.opacity = "1";
        el.rabbit.style.top = "45%"; el.rabbit.style.left = "40%";
        await wait(5000);

        // 3. 核心價值
        updateMsg("守護正義的工具在變，但核心的價值不變。");
        await wait(5000);

        // 4. 背景淡入 + 散開到你指定的座標
        updateMsg("您的支持，是下一代最穩固的底氣。");
        el.house.style.opacity = "1"; 
        
        el.bear.style.top = "60%"; el.bear.style.left = "24%";
        el.fox.style.top = "42%"; el.fox.style.left = "28%";
        el.rabbit.style.top = "61%"; el.rabbit.style.left = "67%";
        await wait(6000);

        // 5. 結尾
        updateMsg("成為傳承的推手，立即支持人權捍衛者：傳承計畫。");
        el.skip.style.display = "none";
        el.bear.style.opacity = "0.2"; el.fox.style.opacity = "0.2"; el.rabbit.style.opacity = "0.2";
        el.cta.style.display = "block";
        el.replay.style.display = "block";
    }

    window.onload = () => setTimeout(play, 500);
</script>

</body>
</html>
