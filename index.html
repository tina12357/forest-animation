<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>森林傳承動畫 - 滿版座標修正版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0f172a; overflow: hidden; color: white; font-family: sans-serif; }
        #canvas { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* 滿版背景樹屋設定 */
        #tree-house { 
            position: absolute; 
            width: 100vw; 
            height: 100vh; 
            top: 0; 
            left: 0; 
            object-fit: cover; 
            object-position: center; 
            opacity: 0; 
            transition: opacity 2s ease-in-out; 
            z-index: 1; 
            filter: brightness(0.6); /* 稍微調暗，讓前景動物更明顯 */
        }
        
        .animal { 
            position: absolute; 
            font-size: 80px; 
            transition: all 1.5s ease; 
            opacity: 0; 
            z-index: 10; 
            text-shadow: 0 0 20px rgba(0,0,0,0.5); 
        }
        
        #caption-box { position: absolute; bottom: 8%; width: 100%; text-align: center; z-index: 100; }
        .caption { 
            display: inline-block; 
            background: rgba(15, 23, 42, 0.9); 
            padding: 15px 30px; 
            border-radius: 8px; 
            font-size: 24px; 
            border-left: 5px solid #38bdf8; 
            opacity: 0; 
            transition: 0.5s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .caption.active { opacity: 1; }

        .btn { position: absolute; z-index: 200; padding: 10px 20px; cursor: pointer; background: #38bdf8; color: black; border: none; border-radius: 5px; font-weight: bold; }
        #skip-btn { bottom: 20px; right: 20px; }
        #replay-btn { top: 20px; right: 20px; display: none; }
        
        #cta-btn { 
            display: none; 
            position: absolute; 
            z-index: 300; 
            background: #10b981; 
            color: white; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            padding: 18px 36px; 
            font-size: 26px; 
            border-radius: 50px;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

<div id="canvas">
    <button id="skip-btn" class="btn">跳過下一段 ➔</button>
    <button id="replay-btn" class="btn" onclick="location.reload()">重新播放</button>
    <button id="cta-btn" onclick="window.open('https://www.tahr.org.tw/civicrm/contribute/transact?reset=1&id=59', '_blank')">立即定期定額支持 ➔</button>
    
    <img id="tree-house" src="treehouse.png" alt="大樹屋背景">
    
    <div id="bear" class="animal">🐻</div>
    <div id="fox" class="animal">🦊</div>
    <div id="rabbit" class="animal">🐰</div>

    <div id="caption-box"><div id="text" class="caption">動畫準備中...</div></div>
</div>

<script>
    const el = {
        bear: document.getElementById('bear'),
        fox: document.getElementById('fox'),
        rabbit: document.getElementById('rabbit'),
        house: document.getElementById('tree-house'),
        text: document.getElementById('text'),
        skip: document.getElementById('skip-btn'),
        cta: document.getElementById('cta-btn'),
        replay: document.getElementById('replay-btn')
    };

    let skipResolve = null;
    function wait(ms) {
        return new Promise(resolve => {
            skipResolve = resolve;
            setTimeout(resolve, ms);
        });
    }

    function updateMsg(msg) {
        el.text.classList.remove('active');
        setTimeout(() => {
            el.text.innerText = msg;
            el.text.classList.add('active');
        }, 300);
    }

    el.skip.onclick = () => { if(skipResolve) skipResolve(); };

    async function play() {
        // --- 1. 資深者 (🐻 登場) ---
        updateMsg("42年的堅持，邀請你一起同行。");
        el.bear.style.opacity = "1";
        el.bear.style.top = "60%"; el.bear.style.left = "24%"; // 套用您的座標
        await wait(4000);

        // --- 2. 世代傳接 (🦊 登場) ---
        updateMsg("現在，新的挑戰，需要更有活力的思維。");
        el.fox.style.opacity = "1";
        el.fox.style.top = "42%"; el.fox.style.left = "28%"; // 套用您的座標
        await wait(5000);

        // --- 3. 專業動能 (🐰 登場) ---
        updateMsg("守護正義的工具在變，但核心的價值不變。");
        el.rabbit.style.opacity = "1";
        el.rabbit.style.top = "61%"; el.rabbit.style.left = "67%"; // 套用您的座標
        await wait(5000);

        // --- 4. 大樹屋背景淡入 ---
        updateMsg("您的支持，是下一代最穩固的底氣。");
        el.house.style.opacity = "1"; 
        await wait(5000);

        // --- 5. 結尾行動召喚 ---
        updateMsg("成為傳承的推手，立即支持人權捍衛者：傳承計畫。");
        el.skip.style.display = "none";
        
        // 讓動物稍微淡出，突顯按鈕
        el.bear.style.opacity = "0.3";
        el.fox.style.opacity = "0.3";
        el.rabbit.style.opacity = "0.3";
        
        el.cta.style.display = "block";
        el.replay.style.display = "block";
    }

    window.onload = () => {
        setTimeout(play, 500); 
    };
</script>

</body>
</html>
